		<style>
			body {
				margin: 0 auto;
				background-color: black;
			}
			
			/*loading bar*/
			body.pace-running:before {
				content: "";
				position: fixed;
				top: 0;
				left: 0;
				bottom: 0;
				right: 0;
				z-index: 1500;
				background-color: rgba(0, 0, 0, 1);
			}
			
			body:before {
				background-color: rgba(0, 0, 0, 0);
				-webkit-transition: background-color 200ms;
				-moz-transtition: background-color 200ms;
				-ms-transition: background-color 200ms;
				-o-transition: background-color: 200ms;
				transition: background-color 200ms;
			}
			
			.pace {
				-webkit-pointer-events: none;
				pointer-events: none;
				-webkit-user-select: none;
				-moz-user-select: none;
				user-select: none;
				z-index: 2000;
				position: fixed;
				margin: auto;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				height: 5px;
				width: 200px;
				background: #fff;
				overflow: hidden;
				border-radius: 10px;
				-moz-border-radius: 10px;
				-webkit-border-radius: 10px;
				-ms-border-radius: 10px;
				-o-border-radius: 10px;
			}
			
			.pace .pace-progress {
				-webkit-box-sizing: border-box;
				-moz-box-sizing: border-box;
				-ms-box-sizing: border-box;
				-o-box-sizing: border-box;
				box-sizing: border-box;
				-webkit-transform: translate3d(0, 0, 0);
				-moz-transform: translate3d(0, 0, 0);
				-ms-transform: translate3d(0, 0, 0);
				-o-transform: translate3d(0, 0, 0);
				transform: translate3d(0, 0, 0);
				max-width: 200px;
				position: fixed;
				z-index: 2000;
				display: block;
				position: absolute;
				top: 0;
				right: 100%;
				height: 100%;
				width: 100%;
				background: magenta;
			}
			
			.pace.pace-inactive {
				display: none;
			}
			
			/*page layout*/
			#wholepage {
				width: 100%;
				height: 100%
				width: 100vw;
				height: 100vh;
				overflow: hidden;
				margin: 0 auto;
			}
			
			#centercontain {
				top: 40px;
				height: 90vh;
				width: 90vw;
				position: relative;
				margin: 0 auto;
				/*min-width: 400px;*/
				max-width: 2500px;
				max-height: 2500px;
			}
			
			#red {
				overflow: hidden;
				position: absolute;
				width: 100px;
				height: 100%;
				margin: 0 auto;
			}
			
			#blue {
				position: absolute;
				height: 100%;
				right: 0;
				width: calc(100% - 100px); /* IE9+ and future browsers */
				width: -moz-calc(100% - 100px); /* Firefox */
				width: -webkit-calc(100% - 100px); /* Chrome, Safari */
				/*min-width:80vw-100px;*/
				margin: 0 auto;
				border-radius: 10px;
				overflow: hidden;
				border: 2px solid transparent;
				transition: border 2s;
			}
			
			.leftimgcontain {
				margin: 0 auto;
				text-align: center;
				position: relative;
				z-index: 20;
				background-size: contain;
				background-repeat: no-repeat;
			}
			
			@font-face {
				font-family: IBMFont;
				src: url(font/Px437_IBM_ISO9.ttf);
			}
			
			@keyframes blink {
				0% { opacity: 1; }
				50% { opacity: 0; }
				100% { opacity: 1; }
			}
			
			@-webkit-keyframes blink {
				0% { opacity: 1; }
				50% { opacity: 0; }
				100% { opacity: 1; }
		  }
			
			@-moz-keyframes blink {
				0% { opacity: 1; }
				50% { opacity: 0; }
				100% { opacity: 1; }
			}
			
			* { 
				box-sizing: border-box;
			}
			
			.containerHelp {
				float: right;
				z-index: 999;
			}
			
			.easy1 {
				background-color: blue;
				width: 25px;
				z-index: 500;
				right: 10px;
				top: 10px;
				position: absolute;
				text-align: center;
				border-radius: 2px;
				-webkit-animation: blink 2s infinite;
				-moz-animation: blink 2s infinite;
				animation: blink 2s infinite;
				background-color: blue;
			}
			
			.easy1:hover {
				background-color: pink;
				z-index: 500;
			}
			
			#p1Next {
				border: none;
				background-color: transparent;
				font-size: 16px;
				font-family: IBMFont;
				color: magenta;
				z-index: 500;
				text-align: center;
				border-radius: 6px;
			}
			
			.easy2 {
				position: absolute;
				display: none;
				padding: 10px;
				background-color: black;
				border: 1px solid magenta;
				width: 200px;
				font-family: IBMFont;
				color: white;
				border-radius: 6px;
				right: 10px;
				z-index: 500;
				top: 10px;
			}
			
			#p2Back {
				border: none;
				background-color: magenta;
				font-size: 16px;
				font-family: IBMFont;
				color: black;
				z-index: 500;
			}
			</style>
		</head>

		<script>
		var dooronegif = new Image();
		dooronegif.src = 'door1.gif';
		var doortwogif = new Image();
		doortwogif.src = 'door2.gif';
		var doortregif = new Image();
		doortregif.src = 'door3.gif';
		var imglist = ["door1","door2","door3"];
		numImgs= Math.floor(Math.random() * imglist.length) +1;
		toplist=[];
		for (i=0;i<numImgs;i++){
			var prev=i-1;
			if (toplist[prev] == null){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
			while ($('#red').height()<toplist[i] + 100){
				toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
			}
			} else{
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
			count = 0;
			while (($('#red').height()<=toplist[i] + ((i+1) * 100)) && (count <= 100)){
				toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
				count = count + 1;
			}	
			};
			imgindex = Math.floor(Math.random() * imglist.length);
			var startingimage = new Image();
			startingimage.src = imglist[imgindex] + "_start.png";
			var div = document.createElement("div");
			div.className = "leftimgcontain";
			div.id = imglist[i];
			div.style.top = toplist[i] + 'px';
			div.style.visibility="hidden";
			$('#red').append(div);
			$('#' + imglist[i]).append(startingimage);
		};
		
		function setdoorgif(objid){
			var img = $(objid).find('img');
			var src = img.attr('src');
			var door = src.replace("_start.png", ".gif")
			if (door == 'door1.gif'){
				img.attr('src','door1.gif'); 
			} else if (door == 'door2.gif'){
				img.attr('src','door2.gif');
			} else if (door == 'door3.gif'){
				img.attr('src','door3.gif');
			}	
		}
		function setlinkfaderedirect(){
			/*
			var audio = document.getElementById("audio1");
			$(audio1).animate({volume: 0}, 1500);
			*/
			cursors.right.enabled=false;
			cursors.left.enabled=false;
			cursors.up.enabled=false;
			cursors.down.enabled=false;
			player.alpha=0;
			poof = game.add.sprite(player.position.x,player.position.y,"poof");
			poof.smoothed=false;
			poof.anchor.x=0.5;
			poof.anchor.y=0.5;
			poof.animations.add("poof",[],25,false,true);
			poof.animations.play("poof",[],25,false,true);
			$('body').css('pointer-events','none');
			//fade out body
			$("body").delay(500).animate({"opacity": "0"}, 2500);
				var linklist = ["/electra.html","/cherry.html"];
			linkindex = Math.floor(Math.random() * linklist.length);
			link = linklist[linkindex];
			setTimeout(function(){
				window.location.assign(link);
			},3000);
		}
		
		$('#door1').click(function(){
			setdoorgif(this);
			setlinkfaderedirect();
		});	
		$('#door2').click(function(){
			setdoorgif(this);
			setlinkfaderedirect();
		});	
		$('#door3').click(function(){
			setdoorgif(this);
			setlinkfaderedirect();
		}); 
		
		var doorContain = $('#door');
		
	</script>
	<script type = "text/javascript" >
		var game = new Phaser.Game(1000, 1000, Phaser.CANVAS, 'blue', {
			preload: preload,
			create: create,
			update: update
		});

		function preload() {

			game.load.image("sky", "lily/sky.png");

			game.load.image("blue1", "lily/blue1.png");

			game.load.image("object3", "lily/object3.png");
			game.load.spritesheet("fountain1", "lily/fountain1.png", 100, 117);

			game.load.spritesheet("witch4", "lily/witch4.png", 68, 66);
			game.load.spritesheet("crow2", "lily/crow2.png", 31, 44);
			game.load.spritesheet("sun1", "lily/sun1.png", 320, 324);
			game.load.spritesheet("sun2", "lily/sun2.png", 128, 128);
			//preload gui elements
			game.load.spritesheet("eyeCursor", "cursors/eyeCursor.png", 85, 55);
			game.load.spritesheet("poof", "guiElements/geniepuff.png", 84, 86);
			game.load.bitmapFont('font', 'guiElements/font.png', 'guiElements/font.fnt');
			//physics and scaling
			game.scale.scaleMode = Phaser.ScaleManager.RESIZE;
			game.renderer.renderSession.roundPixels = true;
			game.world.setBounds(0, 0, 2500, 2500);
			game.physics.startSystem(Phaser.Physics.ARCADE);
		}

		function create() {
			$('.leftimgcontain').css({
				"visibility": "visible"
			});
			//tell pace that load is complete when the "dummy" div "bang" is displayed
			//remove if not using pace loading bar
			$("body").append("<div id='bang'></div>");
			//create a magenta frame around the game div and fade it in
			setTimeout(function() {
				$('#blue').css({
					"border": "2px solid magenta"
				});
			}, 2000);
			//begin art
			game.stage.backgroundColor = "#001398";
			sky = game.add.tileSprite(0, 0, game.world.width, game.world.height, 'sky');
			sky.smoothed = false;
			suns = game.add.group();
			for (var i = 0; i < 8; i++) {
				suns.create(game.world.randomX, game.rnd.integerInRange(-100, 900), "sun1");
				suns.create(game.world.randomX, game.rnd.integerInRange(-50, 900), "sun2");
				suns.setAll("smoothed", false);
				suns.callAll("animations.add", "animations", "suns", [], 10, true);
				suns.callAll("animations.play", "animations", "suns");
			}
			city2 = game.add.tileSprite(0, 1300, game.world.width, 335, 'cityBg3');
			city2.smoothed = false;
			witchGroup = game.add.group();
			witchGroup.enableBody = true;
			witchGroupGen = game.time.events.loop(3500, genWitch, this);
			witchGroupGen.timer.start();
			lilies = game.add.group();
			for (var i = 0; i < 10; i++) {
				lilies.create(game.world.randomX, game.world.height - 600 + Math.random() * 100, "lilypink");
				lilies.setAll("smoothed", false);
			}
			city3 = game.add.tileSprite(0, 1620, game.world.width, 384, 'cityBg4');
			city3.smoothed = false;
			birdGroup = game.add.group();
			birdGroup.enableBody = true;
			birdGroupGen = game.time.events.loop(1300, genBird, this);
			birdGroupGen.timer.start();
			chopGroup = game.add.group();
			chopGroup.enableBody = true;
			chopGroupGen = game.time.events.loop(2500, genChop, this);
			chopGroupGen.timer.start();
			tower = game.add.tileSprite(0, 431, game.world.width, 2069, 'tower');
			tower.smoothed = false;
			platform = game.add.group();
			for (var i = 0; i < 20; i++) {
				platform.create(tower.position.x - 10 + Math.random() * game.world.width, tower.position.y +Math.random() * 1500, "platform");
				platform.setAll("smoothed", false);
			}
			//for each platform...
			platform.forEach(function(platform) {
				tv = game.add.group();
				for (var i = 0; i < 1; i++) {
					tv.create(platform.position.x + 120, platform.position.y + 100, "tv");
					tv.setAll("smoothed", false);
					tv.setAll("scale.x", 1.6);
					tv.setAll("scale.y", 1.6);
					tv.callAll("animations.add", "animations", "tv", [], 10, true);
					tv.callAll("animations.play", "animations", "tv");
				}
				gore = game.add.group();
				for (var i = 0; i < 1; i++) {
					gore.create(platform.position.x + 100, platform.position.y + 150, "slime3");
					gore.create(platform.position.x + 200, platform.position.y + 130, "gore3");
					gore.setAll("smoothed", false);
				}
				fountain = game.add.group();
				for (var i = 0; i < 1; i++) {
					fountain.create(platform.position.x + 10, platform.position.y + 30, "fountain1");
					fountain.setAll("smoothed", false);
					fountain.callAll("animations.add", "animations", "fountain", [], 10, true);
					fountain.callAll("animations.play", "animations", "fountain");
				}
				chicken = game.add.group();
				for (var i = 0; i < 1; i++) {
					chicken.create(platform.position.x + 145, platform.position.y + 175, "chicken");
					chicken.setAll("smoothed", false);
					chicken.callAll("animations.add", "animations", "chicken", [], 10, true);
					chicken.callAll("animations.play", "animations", "chicken");
				}
				alienplant = game.add.group();
				for (var i = 0; i < 1; i++) {
					alienplant.create(platform.position.x + 120, platform.position.y + 120, 'plantopen' + game.rnd.integerInRange(1, 3));
					alienplant.setAll("smoothed", false);
					alienplant.callAll("animations.add", "animations", "alienplant", [], 10, true);
					alienplant.callAll("animations.play", "animations", "alienplant");
				}
				chairs = game.add.group();
				for (var i = 0; i < 1; i++) {
					chairs.create(platform.position.x + Math.random() * 100, platform.position.y + 100, 'yellow' + game.rnd.integerInRange(1, 4));

				plant = game.add.group();
				for (var i = 0; i < 1; i++) {
					plant.create(platform.position.x + 200, platform.position.y + 100, 'object3');

				for (var i = 0; i < 1; i++) {
					clown.create(platform.position.x + 140, platform.position.y + 20, "clown6");
					clown.setAll("smoothed", false);
					clown.callAll("animations.add", "animations", "velma", [], 10, true);
					clown.callAll("animations.play", "animations", "velma");
				}
				lilywave = game.add.group();
				for (var i = 0; i < 1; i++) {
					lilywave.create(platform.position.x + 190, platform.position.y + 80, "lilywave");

			}
			kGroup = game.add.group();
			kGroup.enableBody = true;
			kGroupGen = game.time.events.loop(3500, genK, this);
			kGroupGen.timer.start();
			lilyGroup = game.add.group();
			lilyGroup.enableBody = true;
			lilyGroupGen = game.time.events.loop(3500, genLily, this);
			lilyGroupGen.timer.start();
			chopper = game.add.group();
			for (var i = 0; i < 10; i++) {
				chopper.create(game.world.randomX, game.world.randomY, "copter1");

		function update() {
			//cursor movement
			player.body.velocity.x = 0;
			player.body.velocity.y = 0;
			if (cursors.down.isDown) {
				player.body.velocity.y = 150;
				if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
			} else if (cursors.up.isDown) {
				player.body.velocity.y = -150;
				if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
			} else if (cursors.right.isDown) {
				player.body.velocity.x = 150;
				if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
			} else if (cursors.left.isDown) {
				player.body.velocity.x = -150;
				if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
			}
		}
		
		//generate items, remove them when offscreen & attempt recycle
		function genCrow() {
			for (var i = 0; i < 1; i++) {
				var x = i * 1;
				var velocityX = game.rnd.integerInRange(250, 300);
				var crow;
				crow = crowGroup.getFirstExists(false);
				if (!crow) {
					crow = game.add.sprite(-10, 0, 'crow2');
					crow.preUpdate();
					crow.smoothed = false;
					crow.animations.add("crow", [], 10, true);
					crow.animations.play("crow");
					crowGroup.add(crow);
					crow.anchor.setTo(0.5, 0.5);
					game.physics.arcade.enableBody(crow);
					crow.enableBody = true;
				}
				crow.anchor.setTo(0.5, 0.5);
				crow.reset(-10, game.world.randomY);
				crow.body.velocity.x = velocityX;
				crow.checkWorldBounds = true;
				crow.outOfBoundsKill = true;
			}
		}
