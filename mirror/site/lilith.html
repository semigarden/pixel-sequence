	<style>
body{
	margin:0 auto;
	background-color:black;
}
/*loading bar*/
	body.pace-running:before {
	content: "";
	position: fixed;
	top: 0;
	left: 0;
	bottom: 0;
	right: 0;
	z-index: 1500;
	background-color: rgba(0, 0, 0, 1);
}
body:before {
	background-color: rgba(0, 0, 0, 0);
	-webkit-transition: background-color 200ms;
	-moz-transtition: background-color 200ms;
	-ms-transition: background-color 200ms;
	-o-transition: background-color: 200ms;
	transition: background-color 200ms;
}
.pace {
	-webkit-pointer-events: none;
	pointer-events: none;
	-webkit-user-select: none;
	-moz-user-select: none;
	user-select: none;
	z-index: 2000;
	position: fixed;
	margin: auto;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	height: 5px;
	width: 200px;
	background: #fff;
	overflow: hidden;
	border-radius:10px;
	-moz-border-radius: 10px;
	-webkit-border-radius: 10px;
	-ms-border-radius:10px;
	-o-border-radius:10px;
	}
.pace .pace-progress {
	-webkit-box-sizing: border-box;
	-moz-box-sizing: border-box;
	-ms-box-sizing: border-box;
	-o-box-sizing: border-box;
	box-sizing: border-box;
	-webkit-transform: translate3d(0, 0, 0);
	-moz-transform: translate3d(0, 0, 0);
	-ms-transform: translate3d(0, 0, 0);
	-o-transform: translate3d(0, 0, 0);
	transform: translate3d(0, 0, 0);
	max-width: 200px;
	position: fixed;
	z-index: 2000;
	display: block;
	position: absolute;
	top: 0;
	right: 100%;
	height: 100%;
	width: 100%;
	background: magenta;
	}
	.pace.pace-inactive {
	display: none;
	}
#wholepage{
	width:100%;
	height:100%
	width:100vw;
	height:100vh;
	overflow:hidden;
	margin:0 auto;
}
#centercontain{
	top:40px;
	height:90vh;
	width:90vw;
	position:relative;
	margin: 0 auto;
	/*min-width:400px;*/
	max-width:2500px;
	max-height:2500px;
}
#red{
	overflow:hidden;
	position:absolute;
	width:100px;
	height:100%;
	margin: 0 auto;
}
#blue{
	position:absolute;
	height:100%;
	right:0;
	width: calc(100% - 100px); /* IE9+ and future browsers */
	width: -moz-calc(100% - 100px); /* Firefox */
	width: -webkit-calc(100% - 100px); /* Chrome, Safari */
	/*min-width:80vw-100px;*/
	margin: 0 auto;
	border-radius:10px;
	overflow:hidden;
	border:2px solid transparent;
	transition: border 2s;
}
.leftimgcontain{
  margin:0 auto;
  text-align:center;
  position:relative;
  z-index:20;
  background-size:contain;
  background-repeat:no-repeat;
}
@font-face{
	font-family: IBMFont;
	src: url(font/Px437_IBM_ISO9.ttf);
	}
@keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-webkit-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-moz-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
* { Box-sizing: Border-box }
.containerHelp {
  float: right;
  z-index:999;
}
.easy1{
	background-color: blue;
	width:25px;
	z-index:500;
	right:10px;
	top:10px;
	position:absolute;
	text-align:center;
	border-radius:2px;
	-webkit-animation: blink 2s infinite;
    -moz-animation: blink 2s infinite;

.easy1:hover{

	 z-index:500;
}

	font-family: IBMFont;
	color:magenta;
	z-index:500;
	text-align:center;
	border-radius:6px;
}
.easy2{
	position:absolute;
	display: none;
	padding: 10px;
	background-color: black;
	border:1px solid magenta;
	width:200px;
	font-family: IBMFont;
	color:white;

#p2Back{
