/*loading bar*/
	body.pace-running:before {
	content: "";
	position: fixed;
	top: 0;
	left: 0;
	bottom: 0;
	right: 0;
	z-index: 1500;
	background-color: rgba(0, 0, 0, 1);
}
body:before {
	background-color: rgba(0, 0, 0, 0);
	-webkit-transition: background-color 200ms;
	-moz-transtition: background-color 200ms;
	-ms-transition: background-color 200ms;
	-o-transition: background-color: 200ms;
	transition: background-color 200ms;
}
.pace {
	-webkit-pointer-events: none;
	pointer-events: none;
	-webkit-user-select: none;
	-moz-user-select: none;
	user-select: none;
	z-index: 2000;
	position: fixed;
	margin: auto;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	height: 5px;
	width: 200px;
	background: #fff;
	overflow: hidden;
	border-radius:10px;
	-moz-border-radius: 10px;
	-webkit-border-radius: 10px;
	-ms-border-radius:10px;
	-o-border-radius:10px;
	}

	-ms-box-sizing: border-box;
	-o-box-sizing: border-box;
	box-sizing: border-box;
	-webkit-transform: translate3d(0, 0, 0);
	-moz-transform: translate3d(0, 0, 0);
	-ms-transform: translate3d(0, 0, 0);
	-o-transform: translate3d(0, 0, 0);
	transform: translate3d(0, 0, 0);
	max-width: 200px;
	position: fixed;
	z-index: 2000;
	display: block;
	position: absolute;
	top: 0;
	right: 100%;
	height: 100%;
	width: 100%;

	//ENTER DOOR STUFF
	var dooronegif = new Image();
	dooronegif.src = 'door1.gif';

	doortwogif.src = 'door2.gif';
	var doortregif = new Image();
	doortregif.src = 'door3.gif';
	var imglist = ["door1","door2","door3"];
	numImgs= Math.floor(Math.random() * imglist.length) +1;
	toplist=[];
	for (i=0;i<numImgs;i++){
	  var prev=i-1;
	  if (toplist[prev] == null){
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		while ($('#red').height()<toplist[i] + 100){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		}
	  } else{
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
		count = 0;
		while (($('#red').height()<=toplist[i] + ((i+1) * 100)) && (count <= 100)){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
			count = count + 1;
		}	
	  };
	  imgindex = Math.floor(Math.random() * imglist.length);
	  var startingimage = new Image();
	  startingimage.src = imglist[imgindex] + "_start.png";
	  var div = document.createElement("div");
	  div.className = "leftimgcontain";
	  div.id = imglist[i];
	  div.style.top = toplist[i] + 'px';
	  div.style.visibility="hidden";
	  $('#red').append(div);
	  $('#' + imglist[i]).append(startingimage);
	};
	function setdoorgif(objid){
		var img = $(objid).find('img');
		var src = img.attr('src');
		var door = src.replace("_start.png", ".gif")
		if (door == 'door1.gif'){
			img.attr('src','door1.gif'); 
		} else if (door == 'door2.gif'){
			img.attr('src','door2.gif');
		} else if (door == 'door3.gif'){
			img.attr('src','door3.gif');
		}	
	}

	function update(){
	player.body.velocity.x = 0;
	player.body.velocity.y = 0;
	if (cursors.down.isDown){      
        player.body.velocity.y = 150;
		if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
    }
	 else if (cursors.up.isDown){   
        player.body.velocity.y = -150;
		if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
    }	
	else if (cursors.right.isDown){
        player.body.velocity.x = 150;
		if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
    }
	else if (cursors.left.isDown){  
        player.body.velocity.x = -150;
		if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
    }}
	function genRat(){
	for (var i = 0; i < 1; i++) {
	var x = i * 1;
	var velocityX = game.rnd.integerInRange(-20, -100);         
	var rat;
	rat = ratGroup.getFirstExists(false);
	if (!rat) {               
	rat = game.add.sprite(-10, -10, 'rat1');
	rat.preUpdate();
	rat.smoothed=false;
	rat.animations.add("rat", [],10,true);
	rat.animations.play("rat");
	ratGroup.add(rat);             
	rat.anchor.setTo(0.5, 0.5);            
	game.physics.arcade.enableBody(rat);
	rat.enableBody = true;
	}        
	rat.anchor.setTo(0.5, 0.5);
	rat.reset(game.world.width-10,game.world.randomY); 
	rat.body.velocity.x = velocityX;
	rat.checkWorldBounds = true;
	rat.outOfBoundsKill = true;
	}}
