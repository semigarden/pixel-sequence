	<style>
body{
	margin:0 auto;
	background-color:black;
}
/*loading bar*/
	body.pace-running:before {
	content: "";
	position: fixed;
	top: 0;
	left: 0;
	bottom: 0;
	right: 0;
	z-index: 1500;
	background-color: rgba(0, 0, 0, 1);
}
body:before {
	background-color: rgba(0, 0, 0, 0);
	-webkit-transition: background-color 200ms;
	-moz-transtition: background-color 200ms;
	-ms-transition: background-color 200ms;
	-o-transition: background-color: 200ms;
	transition: background-color 200ms;
}
.pace {
	-webkit-pointer-events: none;
	pointer-events: none;
	-webkit-user-select: none;
	-moz-user-select: none;
	user-select: none;
	z-index: 2000;
	position: fixed;
	margin: auto;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	height: 5px;
	width: 200px;
	background: #fff;
	overflow: hidden;
	border-radius:10px;
	-moz-border-radius: 10px;
	-webkit-border-radius: 10px;
	-ms-border-radius:10px;
	-o-border-radius:10px;
	}
.pace .pace-progress {
	-webkit-box-sizing: border-box;
	-moz-box-sizing: border-box;
	-ms-box-sizing: border-box;
	-o-box-sizing: border-box;
	box-sizing: border-box;
	-webkit-transform: translate3d(0, 0, 0);
	-moz-transform: translate3d(0, 0, 0);
	-ms-transform: translate3d(0, 0, 0);
	-o-transform: translate3d(0, 0, 0);
	transform: translate3d(0, 0, 0);
	max-width: 200px;
	position: fixed;
	z-index: 2000;
	display: block;
	position: absolute;
	top: 0;
	right: 100%;
	height: 100%;
	width: 100%;
	background: magenta;
	}
	.pace.pace-inactive {
	display: none;
	}
#wholepage{
	width:100%;
	height:100%
	width:100vw;
	height:100vh;
	overflow:hidden;
	margin:0 auto;
}
#centercontain{
	top:40px;
	height:90vh;
	width:90vw;
	position:relative;
	margin: 0 auto;
	/*min-width:400px;*/
	max-width:2500px;
	max-height:2500px;
}
#red{
	overflow:hidden;
	position:absolute;
	width:100px;
	height:100%;
	margin: 0 auto;
}
#blue{
	position:absolute;
	height:100%;
	right:0;
	width: calc(100% - 100px); /* IE9+ and future browsers */
	width: -moz-calc(100% - 100px); /* Firefox */
	width: -webkit-calc(100% - 100px); /* Chrome, Safari */
	/*min-width:80vw-100px;*/
	margin: 0 auto;
	border-radius:10px;
	overflow:hidden;
	border:2px solid transparent;
	transition: border 2s;
}
.leftimgcontain{
  margin:0 auto;
  text-align:center;
  position:relative;
  z-index:20;
  background-size:contain;
  background-repeat:no-repeat;
}
@font-face{
	font-family: IBMFont;
	src: url(font/Px437_IBM_ISO9.ttf);
	}
@keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-webkit-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-moz-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
* { Box-sizing: Border-box }
.containerHelp {
  float: right;
  z-index:999;
}
.easy1{
	background-color: blue;
	width:25px;
	z-index:500;
	right:10px;
	top:10px;
	position:absolute;
	text-align:center;
	border-radius:2px;
	-webkit-animation: blink 2s infinite;
    -moz-animation: blink 2s infinite;
    animation: blink 2s infinite;
	background-color: blue;
}
.easy1:hover{
	background-color: pink;
	 z-index:500;
}
#p1Next{
	border:none;
	background-color:transparent;
	font-size:16px;
	font-family: IBMFont;
	color:magenta;
	z-index:500;
	text-align:center;
	border-radius:6px;
}
.easy2{
	position:absolute;
	display: none;
	padding: 10px;
	background-color: black;
	border:1px solid magenta;
	width:200px;
	font-family: IBMFont;
	color:white;
	border-radius:6px;
	right:10px;
	z-index:500;
	top:10px;
}
#p2Back{
	border:none;
	background-color:magenta;
	font-size:16px;
	font-family: IBMFont;
	color:black;
	z-index:500;
}
</style>
</head>
<body>

		<script>
	//ENTER DOOR STUFF
	var dooronegif = new Image();
	dooronegif.src = 'door1.gif';
	var doortwogif = new Image();
	doortwogif.src = 'door2.gif';
	var doortregif = new Image();
	doortregif.src = 'door3.gif';
	var imglist = ["door1","door2","door3"];
	numImgs= Math.floor(Math.random() * imglist.length) +1;
	toplist=[];
	for (i=0;i<numImgs;i++){
	  var prev=i-1;
	  if (toplist[prev] == null){
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		while ($('#red').height()<toplist[i] + 100){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		}
	  } else{
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
		count = 0;
		while (($('#red').height()<=toplist[i] + ((i+1) * 100)) && (count <= 100)){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
			count = count + 1;
		}	
	  };
	  imgindex = Math.floor(Math.random() * imglist.length);
	  var startingimage = new Image();
	  startingimage.src = imglist[imgindex] + "_start.png";
	  var div = document.createElement("div");
	  div.className = "leftimgcontain";
	  div.id = imglist[i];
	  div.style.top = toplist[i] + 'px';
	  div.style.visibility="hidden";
	  $('#red').append(div);
	  $('#' + imglist[i]).append(startingimage);
	};
	function setdoorgif(objid){
		var img = $(objid).find('img');
		var src = img.attr('src');
		var door = src.replace("_start.png", ".gif")
		if (door == 'door1.gif'){
			img.attr('src','door1.gif'); 
		} else if (door == 'door2.gif'){
			img.attr('src','door2.gif');
		} else if (door == 'door3.gif'){
			img.attr('src','door3.gif');
		}	
	}
	function setlinkfaderedirect(){
		/*
		var audio = document.getElementById("audio1");
		$(audio1).animate({volume: 0}, 1500);
	*/
		cursors.right.enabled=false;
		cursors.left.enabled=false;
		cursors.up.enabled=false;
		cursors.down.enabled=false;
		player.alpha=0;
		poof = game.add.sprite(player.position.x,player.position.y,"poof");
		poof.smoothed=false;
		poof.anchor.x=0.5;
		poof.anchor.y=0.5;
		poof.animations.add("poof",[],25,false,true);
		poof.animations.play("poof",[],25,false,true);
	  	$('body').css('pointer-events','none');
		$("body").delay(500).animate({"opacity": "0"}, 2500); // fade out body
	  	var linklist = ["/mai.html"];
		linkindex = Math.floor(Math.random() * linklist.length);
		link = linklist[linkindex];
		setTimeout(function(){
			window.location.assign(link);
		},3000);
	}
	$('#door1').click(function(){
		setdoorgif(this);
		setlinkfaderedirect();
	});	
	$('#door2').click(function(){
		setdoorgif(this);
		setlinkfaderedirect();
	});	
	$('#door3').click(function(){
		setdoorgif(this);
		setlinkfaderedirect();
	}); 
	var doorContain = $('#door');
//DONE WITH DOOR STUFF
	</script>
	<script type="text/javascript">	
	var game = new Phaser.Game(1000, 1000, Phaser.CANVAS, 'blue', { preload: preload, create: create, update: update });
	function preload() {
	game.load.image("bed", "shermie/bed.png");
	game.load.image("bed2", "shermie/bed2.png");
	game.load.image("object2", "shermie/object2.png");
	game.load.image("object3", "shermie/object3.png");
	game.load.image("tilepink", "shermie/tilepink.png");
	game.load.image("pillow1", "shermie/pillow1.png");
	game.load.image("pillow2", "shermie/pillow2.png");
	game.load.image("statue11", "shermie/statue11.png");
	game.load.spritesheet("cartwheel", "shermie/cartwheel.png",217,156);
	game.load.spritesheet("fan1", "shermie/fan1.png",77,70);
	game.load.spritesheet("blue1", "shermie/blue1.png",43,54);
	game.load.image("couch2", "shermie/couch2.png");
	game.load.image("chair2", "shermie/chair2.png");
	game.load.image("chair3", "shermie/chair3.png");
	game.load.image("chair4", "shermie/chair4.png");
	game.load.image("fragment4", "shermie/fragment4.png");
	game.load.image("fragment3", "shermie/fragment3.png");
	game.load.image("fragment2", "shermie/fragment2.png");
	game.load.image("fragment1", "shermie/fragment1.png");
	game.load.image("shrimp", "shermie/shrimp.png");
	game.load.image("couch4", "shermie/couch4.png");
	game.load.image("plant2", "shermie/plant2.png");
	game.load.image("plant4", "shermie/plant4.png");
	game.load.image("background2", "shermie/background2.png");
	game.load.spritesheet("background1", "shermie/background1.png",320,110);
	game.load.spritesheet("candles", "shermie/candles.png",54,124);
	game.load.spritesheet("shermie", "shermie/shermie_35.png",92,138);
	game.load.image("cake", "shermie/cake.png");
	game.load.image("gore3", "shermie/gore3.png");
	game.load.spritesheet("mouse1", "shermie/mouse1.png",37,28);
	game.load.spritesheet("birds2", "shermie/bat1.png",28,52);
	game.load.image("fogBlue2", "shermie/fogBlue2.png");
	game.load.spritesheet("eyeCursor","cursors/eyeCursor.png", 85,55);
	game.load.spritesheet("poof","guiElements/geniepuff.png", 84,86);
		game.load.bitmapFont('font', 'guiElements/font.png', 'guiElements/font.fnt');

	game.scale.scaleMode = Phaser.ScaleManager.RESIZE;
	game.renderer.renderSession.roundPixels = true;
	game.world.setBounds(0,0, 2500,2500);
	game.physics.startSystem(Phaser.Physics.ARCADE);
	}
	function create(){
	$('.leftimgcontain').css({"visibility":"visible"});
	$("body").append("<div id='bang'></div>");
	setTimeout(function(){
	$('#blue').css({"border":"2px solid magenta"});
	}, 2000);
	game.stage.backgroundColor="#FF00FF";
	tile= game.add.tileSprite(0, 100,  game.world.width, game.world.height ,'tilepink');
	tile.smoothed=false;
	bg2=game.add.tileSprite(0,10,game.world.width,110,"background1");
	bg2.smoothed=false;
	bg2.animations.add("bg2",[],5,true);
	bg2.animations.play("bg2");
	bg=game.add.tileSprite(0,0,game.world.width,188,"background2");
	bg.smoothed=false;
	skel=game.add.tileSprite(0,165,game.world.width,31,"gore3");
	skel.smoothed=false;
	fog = game.add.group ();
	for (var i = 0; i < 30; i++)
	{
	fog.create(game.world.randomX, game.world.randomY, 'fogBlue2');
	fog.setAll("smoothed", false);
	}
	pillows = game.add.group ();
	for (var i = 0; i < 8; i++)
	{
	pillows.create(game.world.randomX, game.world.randomY+150, 'pillow1');
	pillows.create(game.world.randomX, game.world.randomY+150, 'pillow2');
	pillows.setAll("smoothed", false);
	pillows.setAll("scale.x", .5);
	pillows.setAll("scale.y", .5);
	}
	fragments = game.add.group ();
	for (var i = 0; i < 20; i++)
	{
	fragments.create(game.world.randomX, game.world.randomY+150, 'fragment1');
	fragments.create(game.world.randomX, game.world.randomY+150, 'fragment2');
	fragments.create(game.world.randomX, game.world.randomY+150, 'fragment3');
	fragments.create(game.world.randomX, game.world.randomY+150, 'shrimp');
	fragments.create(game.world.randomX, game.world.randomY+150, 'cake');
	fragments.setAll("smoothed", false);
	}
	cartwheel = game.add.group ();
	for (var i = 0; i < 20; i++)
	{
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'mouse1');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'candles');
	cartwheel.create(game.world.randomX, game.rnd.integerInRange(100,150), 'candles');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'couch2');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'chair2');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'chair3');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'chair4');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'couch4');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'plant2');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'plant4');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'blue1');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'fragment4');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'statue11');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'bed');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'bed2');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'cartwheel');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'shermie');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'object2');
	cartwheel.create(game.world.randomX, game.world.randomY+150, 'object3');
	cartwheel.setAll("smoothed", false);
	cartwheel.setAll("anchor.x", .5);
	cartwheel.setAll("anchor.y", .5);
	cartwheel.callAll("animations.add","animations","cartwheel",[],10, true);
	cartwheel.callAll("animations.play","animations","cartwheel");
	}
	cartwheel.sort();
	fans = game.add.group ();
	for (var i = 0; i < 10; i++)
	{
	fans.create(game.world.randomX, -10, 'fan1');
	fans.setAll("smoothed", false);
	fans.callAll("animations.add","animations","fans",[],10, true);
	fans.callAll("animations.play","animations","fans");
	}
	cursors = game.input.keyboard.createCursorKeys();
	player= game.add.sprite(100,0,"eyeCursor");	
	game.physics.arcade.enable(player);
	game.camera.follow(player);
	player.body.collideWorldBounds = true;
	player.anchor.set(0.5);
	player.smoothed=false;
	player.animations.add('blink', [], 2, true);
	player.animations.play('blink', [],2,true);
	arrows = game.add.bitmapText(player.position.x,player.position.y+60, 'font','  ← ↑ ↓ →\n arrow keys',28);
	arrows.anchor.x=0.5;
	arrows.smoothed=false;
	arrows.alpha=1;
	arrowTween = game.add.tween(arrows).to( { alpha: 0},1000,Phaser.Easing.Linear.None,true,0,-1);
	forGroup = game.add.group();
    forGroup.enableBody = true;
	forGroupGen = game.time.events.loop(1500, genFogs, this);
    forGroupGen.timer.start();
	birds = game.add.group();
    birds.enableBody = true;
	birdsGen = game.time.events.loop(1500, genBirds, this);
    birdsGen.timer.start();
	}
	function update(){
	cartwheel.sort('y', Phaser.Group.SORT_ASCENDING);
	player.body.velocity.x = 0;
	player.body.velocity.y = 0;
	if (cursors.down.isDown){ 
    player.body.velocity.y = 150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}
	else if (cursors.up.isDown){
    player.body.velocity.y = -150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}	
	else if (cursors.right.isDown){
    player.body.velocity.x = 150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}
	else if (cursors.left.isDown){  
    player.body.velocity.x = -150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}
	}
	function genBirds(){
	for (var i = 0; i < 1; i++) {
	var x = i * 1;
	var velocityX = game.rnd.integerInRange(-150, -180);
	var bird;
	bird = birds.getFirstExists(false);
	if (!bird) {
	bird = game.add.sprite(-10, 0, 'birds2');
	bird.preUpdate();
	bird.smoothed=false;
	bird.scale.x=1.2;
	bird.scale.y=1.2;
	bird.animations.add("bird", [], 10,true);
	bird.animations.play("bird");
	birds.add(bird);
	bird.anchor.setTo(0, 0.5);
	game.physics.arcade.enableBody(bird);
	bird.enableBody = true;
	}
	bird.anchor.setTo(0, 0.5);
	bird.reset(game.world.width-10,game.world.randomY); 
	bird.body.velocity.x = velocityX;
	bird.checkWorldBounds = true;
	bird.outOfBoundsKill = true;
	}}
	function genFogs(){
	for (var i = 0; i < 1; i++) {
	var x = i * 1;
	var velocityX = game.rnd.integerInRange(100, 120);
	var fogs;
	fogs = forGroup.getFirstExists(false);
	if (!fogs) {
	fogs = game.add.sprite(-700, 0, 'fogBlue2');
	fogs.preUpdate();
	fogs.smoothed=false;
	forGroup.add(fogs);
	fogs.anchor.setTo(0, 0.5);
	game.physics.arcade.enableBody(fogs);
	fogs.enableBody = true;
	}
	fogs.anchor.setTo(0, 0.5);
	fogs.reset(-700,game.world.randomY); 
	fogs.body.velocity.x = velocityX;
	fogs.checkWorldBounds = true;
	fogs.outOfBoundsKill = true;
	}}
	</script>
	</body>
