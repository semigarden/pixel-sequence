	<style>
body{
	margin:0 auto;
	background-color:black;
}
/*loading bar*/
	body.pace-running:before {
	content: "";
	position: fixed;
	top: 0;
	left: 0;
	bottom: 0;
	right: 0;
	z-index: 1500;
	background-color: rgba(0, 0, 0, 1);
}
body:before {
	background-color: rgba(0, 0, 0, 0);
	-webkit-transition: background-color 200ms;
	-moz-transtition: background-color 200ms;
	-ms-transition: background-color 200ms;
	-o-transition: background-color: 200ms;
	transition: background-color 200ms;
}
.pace {
	-webkit-pointer-events: none;
	pointer-events: none;
	-webkit-user-select: none;
	-moz-user-select: none;
	user-select: none;
	z-index: 2000;
	position: fixed;
	margin: auto;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	height: 5px;
	width: 200px;
	background: #fff;
	overflow: hidden;
	border-radius:10px;
	-moz-border-radius: 10px;
	-webkit-border-radius: 10px;
	-ms-border-radius:10px;
	-o-border-radius:10px;
	}
.pace .pace-progress {
	-webkit-box-sizing: border-box;
	-moz-box-sizing: border-box;
	-ms-box-sizing: border-box;
	-o-box-sizing: border-box;
	box-sizing: border-box;
	-webkit-transform: translate3d(0, 0, 0);
	-moz-transform: translate3d(0, 0, 0);
	-ms-transform: translate3d(0, 0, 0);
	-o-transform: translate3d(0, 0, 0);
	transform: translate3d(0, 0, 0);
	max-width: 200px;
	position: fixed;
	z-index: 2000;
	display: block;
	position: absolute;
	top: 0;
	right: 100%;
	height: 100%;
	width: 100%;
	background: magenta;
	}
	.pace.pace-inactive {
	display: none;
	}
#wholepage{
	width:100%;
	height:100%
	width:100vw;
	height:100vh;
	overflow:hidden;
	margin:0 auto;
}
#centercontain{
	top:40px;
	height:90vh;
	width:90vw;
	position:relative;
	margin: 0 auto;
	/*min-width:400px;*/
	max-width:2500px;
	max-height:2500px;
}
#red{
	overflow:hidden;
	position:absolute;
	width:100px;
	height:100%;
	margin: 0 auto;
}
#blue{
	position:absolute;
	height:100%;
	right:0;
	width: calc(100% - 100px); /* IE9+ and future browsers */
	width: -moz-calc(100% - 100px); /* Firefox */
	width: -webkit-calc(100% - 100px); /* Chrome, Safari */
	/*min-width:80vw-100px;*/
	margin: 0 auto;
	border-radius:10px;
	overflow:hidden;
	border:2px solid transparent;
	transition: border 2s;
}
.leftimgcontain{
  margin:0 auto;
  text-align:center;
  position:relative;
  z-index:20;
  background-size:contain;
  background-repeat:no-repeat;
}
@font-face{
	font-family: IBMFont;
	src: url(font/Px437_IBM_ISO9.ttf);
	}
@keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-webkit-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-moz-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
* { Box-sizing: Border-box }

  float: right;
  z-index:999;

	right:10px;
	top:10px;

.easy2{

#p2Back{

	background-color:magenta;
	font-size:16px;
	font-family: IBMFont;
	color:black;
	z-index:500;

	//ENTER DOOR STUFF
	var dooronegif = new Image();
	dooronegif.src = 'door1.gif';
	var doortwogif = new Image();
	doortwogif.src = 'door2.gif';
	var doortregif = new Image();
	doortregif.src = 'door3.gif';
	var imglist = ["door1","door2","door3"];
	numImgs= Math.floor(Math.random() * imglist.length) +1;
	toplist=[];
	for (i=0;i<numImgs;i++){
	  var prev=i-1;
	  if (toplist[prev] == null){
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		while ($('#red').height()<toplist[i] + 100){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		}
	  } else{
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
		count = 0;
		while (($('#red').height()<=toplist[i] + ((i+1) * 100)) && (count <= 100)){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
			count = count + 1;
		}	
	  };
	  imgindex = Math.floor(Math.random() * imglist.length);
	  var startingimage = new Image();
	  startingimage.src = imglist[imgindex] + "_start.png";
	  var div = document.createElement("div");
	  div.className = "leftimgcontain";
	  div.id = imglist[i];
	  div.style.top = toplist[i] + 'px';
	  div.style.visibility="hidden";
	  $('#red').append(div);
	  $('#' + imglist[i]).append(startingimage);
	};
	function setdoorgif(objid){
		var img = $(objid).find('img');
		var src = img.attr('src');
		var door = src.replace("_start.png", ".gif")
		if (door == 'door1.gif'){
			img.attr('src','door1.gif'); 
		} else if (door == 'door2.gif'){
			img.attr('src','door2.gif');
		} else if (door == 'door3.gif'){
			img.attr('src','door3.gif');
		}	
	}
	function setlinkfaderedirect(){
		/*
		var audio = document.getElementById("audio1");
		$(audio1).animate({volume: 0}, 1500);
	*/
		cursors.right.enabled=false;
		cursors.left.enabled=false;
		cursors.up.enabled=false;
		cursors.down.enabled=false;
		player.alpha=0;
		poof = game.add.sprite(player.position.x,player.position.y,"poof");
		poof.smoothed=false;
		poof.anchor.x=0.5;
		poof.anchor.y=0.5;
		poof.animations.add("poof",[],25,false,true);
		poof.animations.play("poof",[],25,false,true);
	  	$('body').css('pointer-events','none');
		$("body").delay(500).animate({"opacity": "0"}, 2500); // fade out body
	  	var linklist = ["/wanna.html"];
		linkindex = Math.floor(Math.random() * linklist.length);
		link = linklist[linkindex];
		setTimeout(function(){
			window.location.assign(link);
		},3000);
	}
	$('#door1').click(function(){
		setdoorgif(this);
		setlinkfaderedirect();
	});

		setdoorgif(this);
		setlinkfaderedirect();
	});	
	$('#door3').click(function(){
		setdoorgif(this);
		setlinkfaderedirect();
	}); 
	var doorContain = $('#door');

	electra.create(game.world.randomX, game.world.randomY+320, 'dom22');
	electra.create(game.world.randomX, game.world.randomY+320, 'dom26');
	electra.create(game.world.randomX, game.world.randomY+320, 'dom27');
	electra.create(game.world.randomX, game.world.randomY+320, 'dom6');
	electra.create(game.world.randomX, game.world.randomY+320, 'dom7');
	electra.setAll("smoothed", false);
	electra.setAll("anchor.x", 0.5);
	electra.setAll("anchor.y", 0.5);
	electra.callAll("animations.add","animations","electra",[],10, true);
	electra.callAll("animations.play","animations","electra");
	}
	electra.sort();
	cursors = game.input.keyboard.createCursorKeys();
	player= game.add.sprite(100,0,"eyeCursor");	
	game.physics.arcade.enable(player);
	game.camera.follow(player);
	player.body.collideWorldBounds = true;
	player.anchor.set(0.5);
	player.smoothed=false;
	player.animations.add('blink', [], 2, true);
	player.animations.play('blink', [],2,true);
	arrows = game.add.bitmapText(player.position.x,player.position.y+60, 'font','  ← ↑ ↓ →\n arrow keys',28);
	arrows.anchor.x=0.5;
	arrows.smoothed=false;
	arrows.alpha=1;
	arrowTween = game.add.tween(arrows).to( { alpha: 0},1000,Phaser.Easing.Linear.None,true,0,-1);
	mirror = game.add.group ();
	for (var i = 0; i < 10; i++)
	{
	mirror.create(game.world.randomX, game.world.randomY+320, 'mirror');
	mirror.callAll("animations.add","animations","mirror",[],10, true);
	mirror.callAll("animations.play","animations","mirror");
	mirror.setAll("smoothed", false);
	}
	fogGroup = game.add.group();
    fogGroup.enableBody = true;
	fogGroupGen = game.time.events.loop(5500, genFog, this);
    fogGroupGen.timer.start();
	bubbles = game.add.group ();
	for (var i = 0; i < 4; i++)
	{
	bubbles.create(game.world.randomX, game.world.randomY, 'bubbles1');
	bubbles.create(game.world.randomX, game.world.randomY, 'bubbles2');
	bubbles.create(game.world.randomX, game.world.randomY, 'bubbles3');
	bubbles.setAll("smoothed", false);
	bubbles.callAll("animations.add","animations","bubbles",[],10, true);
	bubbles.callAll("animations.play","animations","bubbles");
	}
	flares = game.add.group ();
	for (var i = 0; i < 10; i++)
	{
	flares.create(game.world.randomX, game.world.randomY, 'flare2');
	flares.create(game.world.randomX, game.world.randomY, 'flare3');
	flares.setAll("smoothed", false);
	flares.callAll("animations.add","animations","flares",[],10, true);
	flares.callAll("animations.play","animations","flares");
	}
	}
	function update(){
	electra.sort('y', Phaser.Group.SORT_ASCENDING);
	walkGroup.sort('y', Phaser.Group.SORT_ASCENDING);
	player.body.velocity.x = 0;
	player.body.velocity.y = 0;
	if (cursors.down.isDown){ 
    player.body.velocity.y = 150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}
	else if (cursors.up.isDown){
    player.body.velocity.y = -150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}	
	else if (cursors.right.isDown){
    player.body.velocity.x = 150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}
	else if (cursors.left.isDown){  
    player.body.velocity.x = -150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}
	}
	function genWalk(){
	for (var i = 0; i < 1; i++) {
	var x = i * 1;
	var velocityX = game.rnd.integerInRange(50, 80);
	var walk;
	walk = walkGroup.getFirstExists(false);
	if (!walk) {
	walk = game.add.sprite(-10, 0, 'dom'+game.rnd.integerInRange(28,30));
	walk.preUpdate();
	walk.smoothed=false;
	walk.animations.add("walk", [], 10,true);
	walk.animations.play("walk");
	walkGroup.add(walk);
	walk.anchor.setTo(0, 0.5);
	game.physics.arcade.enableBody(walk);
	walk.enableBody = true;
	}
	walk.anchor.setTo(0, 0.5);
	walk.reset(-10,game.rnd.integerInRange(150,250)); 
	walk.body.velocity.x = velocityX;
	walk.checkWorldBounds = true;
	walk.outOfBoundsKill = true;
	}}
	function genFog(){
	for (var i = 0; i < 1; i++) {
	var x = i * 1;
	var velocityX = game.rnd.integerInRange(50, 80);
	var fogP;
	fogP = fogGroup.getFirstExists(false);
	if (!fogP) {
	fogP = game.add.sprite(-350, 0, 'fogpink');
	fogP.preUpdate();
	fogP.smoothed=false;
	fogP.animations.add("fogP", [], 10,true);
	fogP.animations.play("fogP");
	fogGroup.add(fogP);
	fogP.anchor.setTo(0, 0.5);
	game.physics.arcade.enableBody(fogP);
	fogP.enableBody = true;
	}
	fogP.anchor.setTo(0, 0.5);
	fogP.reset(-350,game.world.randomY); 
	fogP.body.velocity.x = velocityX;
	fogP.checkWorldBounds = true;
	fogP.outOfBoundsKill = true;
	}}
</script>
