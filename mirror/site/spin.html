body{
	margin:0 auto;

}
/*loading bar*/
	body.pace-running:before {
	content: "";
	position: fixed;
	top: 0;
	left: 0;
	bottom: 0;
	right: 0;
	z-index: 1500;
	background-color: rgba(0, 0, 0, 1);
}
body:before {
	background-color: rgba(0, 0, 0, 0);
	-webkit-transition: background-color 200ms;
	-moz-transtition: background-color 200ms;
	-ms-transition: background-color 200ms;
	-o-transition: background-color: 200ms;
	transition: background-color 200ms;
}
.pace {
	-webkit-pointer-events: none;
	pointer-events: none;
	-webkit-user-select: none;
	-moz-user-select: none;
	user-select: none;
	z-index: 2000;
	position: fixed;
	margin: auto;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	height: 5px;
	width: 200px;
	background: #fff;
	overflow: hidden;
	border-radius:10px;
	-moz-border-radius: 10px;
	-webkit-border-radius: 10px;
	-ms-border-radius:10px;
	-o-border-radius:10px;
	}
.pace .pace-progress {
	-webkit-box-sizing: border-box;
	-moz-box-sizing: border-box;
	-ms-box-sizing: border-box;
	-o-box-sizing: border-box;
	box-sizing: border-box;
	-webkit-transform: translate3d(0, 0, 0);
	-moz-transform: translate3d(0, 0, 0);
	-ms-transform: translate3d(0, 0, 0);
	-o-transform: translate3d(0, 0, 0);
	transform: translate3d(0, 0, 0);
	max-width: 200px;
	position: fixed;
	z-index: 2000;
	display: block;
	position: absolute;
	top: 0;
	right: 100%;
	height: 100%;
	width: 100%;
	background: magenta;
	}
	.pace.pace-inactive {
	display: none;
	}
#wholepage{
	width:100%;
	height:100%
	width:100vw;
	height:100vh;
	overflow:hidden;
	margin:0 auto;
}
#centercontain{
	top:40px;
	height:90vh;
	width:90vw;
	position:relative;
	margin: 0 auto;
	/*min-width:400px;*/
	max-width:2500px;
	max-height:2500px;
}
#red{
	overflow:hidden;
	position:absolute;
	width:100px;
	height:100%;
	margin: 0 auto;
}
#blue{
	position:absolute;
	height:100%;
	right:0;
	width: calc(100% - 100px); /* IE9+ and future browsers */
	width: -moz-calc(100% - 100px); /* Firefox */
	width: -webkit-calc(100% - 100px); /* Chrome, Safari */
	/*min-width:80vw-100px;*/
	margin: 0 auto;
	border-radius:10px;
	overflow:hidden;
	border:2px solid transparent;
	transition: border 2s;
}
.leftimgcontain{
  margin:0 auto;
  text-align:center;
  position:relative;
  z-index:20;
  background-size:contain;
  background-repeat:no-repeat;
}
@font-face{
	font-family: IBMFont;
	src: url(font/Px437_IBM_ISO9.ttf);
	}
@keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-webkit-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-moz-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
* { Box-sizing: Border-box }
.containerHelp {
  float: right;
  z-index:999;
}

	//ENTER DOOR STUFF
	var dooronegif = new Image();
	dooronegif.src = 'door1.gif';

	var doortregif = new Image();

	var imglist = ["door1","door2","door3"];
	numImgs= Math.floor(Math.random() * imglist.length) +1;
	toplist=[];
	for (i=0;i<numImgs;i++){
	  var prev=i-1;
	  if (toplist[prev] == null){
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		while ($('#red').height()<toplist[i] + 100){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		}
	  } else{
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
		count = 0;
		while (($('#red').height()<=toplist[i] + ((i+1) * 100)) && (count <= 100)){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
			count = count + 1;
		}	
	  };
	  imgindex = Math.floor(Math.random() * imglist.length);
	  var startingimage = new Image();
	  startingimage.src = imglist[imgindex] + "_start.png";
	  var div = document.createElement("div");
	  div.className = "leftimgcontain";
	  div.id = imglist[i];
	  div.style.top = toplist[i] + 'px';
	  div.style.visibility="hidden";
	  $('#red').append(div);
	  $('#' + imglist[i]).append(startingimage);
	};

		var img = $(objid).find('img');
		var src = img.attr('src');
		var door = src.replace("_start.png", ".gif")
		if (door == 'door1.gif'){
			img.attr('src','door1.gif'); 
		} else if (door == 'door2.gif'){
			img.attr('src','door2.gif');
		} else if (door == 'door3.gif'){
			img.attr('src','door3.gif');
		}	
	}

	*/
		cursors.right.enabled=false;

	function createVan(){
	for (var i = 0; i < 1; i++) {
	var x = i * 1;
	var velocityX = game.rnd.integerInRange(100, 350);         
	var van;
	van = vanGroup.getFirstExists(false);
	if (!van) {               
	van = game.add.sprite(-60, 0, 'zerovan');
	van.animations.add("van", [],25,true);
	van.animations.play("van");	
	van.smoothed=false;
	vanGroup.add(van);  
	van.anchor.setTo(0.5, 0.5);    			
	game.physics.arcade.enableBody(van);
	van.enableBody = true;
	}        
	van.anchor.setTo(0.5, 0.5);
	van.reset(-60,game.world.randomY+290); 
	van.body.velocity.x = velocityX;
	van.checkWorldBounds = true;
	van.outOfBoundsKill = true;	
	}}
