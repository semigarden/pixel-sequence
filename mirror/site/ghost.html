<html>
    <head>
	<script>
	paceOptions = {
	ajax: false, // disabled
	document: false, // disabled
	eventLag: false, // disabled
	elements: {
	selectors: ['#bang']
	}
	};
	</script>
	<script src="/pace/pace.js"></script>
    <meta charset="UTF-8" />
    <script src="/js/phaser.min.js"></script>

	<style>
body{
	margin:0 auto;
	background-color:black;
}
/*loading bar*/
	body.pace-running:before {
	content: "";
	position: fixed;
	top: 0;
	left: 0;
	bottom: 0;
	right: 0;
	z-index: 1500;
	background-color: rgba(0, 0, 0, 1);
}
body:before {
	background-color: rgba(0, 0, 0, 0);
	-webkit-transition: background-color 200ms;
	-moz-transtition: background-color 200ms;
	-ms-transition: background-color 200ms;
	-o-transition: background-color: 200ms;
	transition: background-color 200ms;
}
.pace {
	-webkit-pointer-events: none;
	pointer-events: none;
	-webkit-user-select: none;
	-moz-user-select: none;
	user-select: none;
	z-index: 2000;
	position: fixed;
	margin: auto;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	height: 5px;
	width: 200px;
	background: #fff;
	overflow: hidden;
	border-radius:10px;
	-moz-border-radius: 10px;
	-webkit-border-radius: 10px;
	-ms-border-radius:10px;
	-o-border-radius:10px;
	}
.pace .pace-progress {
	-webkit-box-sizing: border-box;
	-moz-box-sizing: border-box;
	-ms-box-sizing: border-box;
	-o-box-sizing: border-box;
	box-sizing: border-box;
	-webkit-transform: translate3d(0, 0, 0);
	-moz-transform: translate3d(0, 0, 0);
	-ms-transform: translate3d(0, 0, 0);
	-o-transform: translate3d(0, 0, 0);
	transform: translate3d(0, 0, 0);
	max-width: 200px;
	position: fixed;
	z-index: 2000;
	display: block;
	position: absolute;
	top: 0;
	right: 100%;
	height: 100%;
	width: 100%;
	background: magenta;
	}
	.pace.pace-inactive {
	display: none;
	}
#wholepage{
	width:100%;
	height:100%
	width:100vw;
	height:100vh;
	overflow:hidden;
	margin:0 auto;
}
#centercontain{
	top:40px;
	height:90vh;
	width:90vw;
	position:relative;
	margin: 0 auto;
	/*min-width:400px;*/
	max-width:2500px;
	max-height:2500px;
}
#red{
	overflow:hidden;
	position:absolute;
	width:100px;
	height:100%;
	margin: 0 auto;
}
#blue{
	position:absolute;
	height:100%;
	right:0;
	width: calc(100% - 100px); /* IE9+ and future browsers */
	width: -moz-calc(100% - 100px); /* Firefox */
	width: -webkit-calc(100% - 100px); /* Chrome, Safari */
	/*min-width:80vw-100px;*/
	margin: 0 auto;
	border-radius:10px;
	overflow:hidden;
	border:2px solid transparent;
	transition: border 2s;
}
.leftimgcontain{
  margin:0 auto;
  text-align:center;
  position:relative;
  z-index:20;
  background-size:contain;
  background-repeat:no-repeat;
}
@font-face{
	font-family: IBMFont;
	src: url(/font/Px437_IBM_ISO9.ttf);
	}
@keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-webkit-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-moz-keyframes blink{
    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
* { Box-sizing: Border-box }
.containerHelp {
  float: right;
  z-index:999;
}
.easy1{
	background-color: blue;
	width:25px;
	z-index:500;
	right:10px;
	top:10px;
	position:absolute;
	text-align:center;
	border-radius:2px;
	-webkit-animation: blink 2s infinite;
    -moz-animation: blink 2s infinite;
    animation: blink 2s infinite;
	background-color: blue;
}
.easy1:hover{
	background-color: pink;
	 z-index:500;
}
#p1Next{
	border:none;
	background-color:transparent;
	font-size:16px;
	font-family: IBMFont;
	color:magenta;
	z-index:500;
	text-align:center;
	border-radius:6px;
}
.easy2{
	position:absolute;
	display: none;
	padding: 10px;
	background-color: black;
	border:1px solid magenta;
	width:200px;
	font-family: IBMFont;
	color:white;
	border-radius:6px;
	right:10px;
	z-index:500;
	top:10px;
}
#p2Back{
	border:none;
	background-color:magenta;
	font-size:16px;
	font-family: IBMFont;
	color:black;
	z-index:500;
}
</style>
<body>
<div class="containerHelp">
<div class="easy1"><input id="p1Next" type="button" value="?"></div>
<div class="easy2">The temperature drops drastically. Wrapping your arms around yourself, you're engulfed by a bright fog.<br><br>Use arrow keys to explore the area. Leave through a door when you're ready, or close the browser page.<br><br><input id="p2Back" type="button" value="> Close"></div>
</div>
<script>
$( "#p1Next" ).click(function() {
	$('.easy1').slideToggle(500);
	$('.easy2').slideToggle(500);
});
$( "#p2Back" ).click(function() {
	$('.easy1').slideToggle(500);
	$('.easy2').slideToggle(500);
});
</script>

<div id="centercontain">

</div>

</div> 
	<script>
	//ENTER DOOR STUFF
	var dooronegif = new Image();
	dooronegif.src = 'door1.gif';
	var doortwogif = new Image();
	doortwogif.src = 'door2.gif';
	var doortregif = new Image();
	doortregif.src = 'door3.gif';
	var imglist = ["door1","door2","door3"];
	numImgs= Math.floor(Math.random() * imglist.length) +1;
	toplist=[];
	for (i=0;i<numImgs;i++){
	  var prev=i-1;
	  if (toplist[prev] == null){
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		while ($('#red').height()<toplist[i] + 100){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		}
	  } else{
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
		count = 0;
		while (($('#red').height()<=toplist[i] + ((i+1) * 100)) && (count <= 100)){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
			count = count + 1;
		}	
	  };
	  imgindex = Math.floor(Math.random() * imglist.length);
	  var startingimage = new Image();
	  startingimage.src = imglist[imgindex] + "_start.png";
	  var div = document.createElement("div");
	  div.className = "leftimgcontain";
	  div.id = imglist[i];
	  div.style.top = toplist[i] + 'px';
	  div.style.visibility="hidden";
	  $('#red').append(div);
	  $('#' + imglist[i]).append(startingimage);
	};
	function setdoorgif(objid){
		var img = $(objid).find('img');
		var src = img.attr('src');
		var door = src.replace("_start.png", ".gif")
		if (door == 'door1.gif'){
			img.attr('src','door1.gif'); 
		} else if (door == 'door2.gif'){
			img.attr('src','door2.gif');
		} else if (door == 'door3.gif'){
			img.attr('src','door3.gif');
		}	
	}
	function setlinkfaderedirect(){
		/*
		var audio = document.getElementById("audio1");
		$(audio1).animate({volume: 0}, 1500);
	*/
		cursors.right.enabled=false;
		cursors.left.enabled=false;
		cursors.up.enabled=false;
		cursors.down.enabled=false;
		player.alpha=0;
		poof = game.add.sprite(player.position.x,player.position.y,"poof");
		poof.smoothed=false;
		poof.anchor.x=0.5;
		poof.anchor.y=0.5;
		poof.animations.add("poof",[],25,false,true);
		poof.animations.play("poof",[],25,false,true);
	  	$('body').css('pointer-events','none');
		$("body").delay(500).animate({"opacity": "0"}, 2500); // fade out body
	  	var linklist = ["/glimmer.html","/flicker.html"];
		linkindex = Math.floor(Math.random() * linklist.length);
		link = linklist[linkindex];
		setTimeout(function(){
		window.location.assign(link);
		},3000);
	}
	$('#door1').click(function(){
		setdoorgif(this);
		setlinkfaderedirect();
	});	
	$('#door2').click(function(){
		setdoorgif(this);
		setlinkfaderedirect();
	});	
	$('#door3').click(function(){
		setdoorgif(this);
		setlinkfaderedirect();
	}); 
	var doorContain = $('#door');
//DONE WITH DOOR STUFF
	</script>
	<script type="text/javascript">	
	var game = new Phaser.Game(1000, 1000, Phaser.CANVAS, 'blue', { preload: preload, create: create, update: update });
	function preload() {
	game.load.spritesheet("barrel4","ghost/barrel4.png",72.5,103);
	game.load.image("car1","ghost/car1.png");
	game.load.image("car2","ghost/car2.png");
	game.load.image("fogpink","ghost/fogpink.png");
	game.load.image("grass8","ghost/grass8.png");
	game.load.spritesheet("ghosts2","ghost/ghosts2.png",67,99);
	game.load.image("ground","ghost/ground.png");
	game.load.image("pillow1","ghost/pillow1.png");
	game.load.image("matches","ghost/matches.png");
	game.load.image("waterplant1","ghost/waterplant1.png");
	game.load.image("waterplant5","ghost/waterplant5.png");
	game.load.spritesheet("frog","ghost/frog.png",128,61);
	game.load.spritesheet("eyeCursor","cursors/eyeCursor.png", 85,55);
	game.load.spritesheet("poof","guiElements/geniepuff.png", 84,86);
	game.load.bitmapFont('font', 'guiElements/font.png', 'guiElements/font.fnt');
	game.scale.scaleMode = Phaser.ScaleManager.RESIZE;
	game.renderer.renderSession.roundPixels = true;
	game.world.setBounds(0,0, 2500,2500);
	game.physics.startSystem(Phaser.Physics.ARCADE);
	}
	function create(){
	$('.leftimgcontain').css({"visibility":"visible"});
	$("body").append("<div id='bang'></div>");
	setTimeout(function(){
	$('#blue').css({"border":"2px solid magenta"});
	}, 2000);
	game.stage.backgroundColor="#1052FF";
	ground = game.add.group ();
	for (var i = 0; i < 100; i++){
	ground.create(game.world.randomX, game.world.randomY, 'ground');
	ground.setAll("smoothed", false);
	}
	grass = game.add.group ();
	for (var i = 0; i < 100; i++){
	grass.create(game.world.randomX, game.world.randomY, 'grass8');
	grass.setAll("smoothed", false);
	}
	waterplant = game.add.group ();
	for (var i = 0; i < 100; i++){
	waterplant.create(game.world.randomX, game.world.randomY, 'waterplant1');
	waterplant.create(game.world.randomX, game.world.randomY, 'waterplant5');
	waterplant.setAll("smoothed", false);
	}
	pillow = game.add.group ();
	for (var i = 0; i < 10; i++){
	pillow.create(game.world.randomX, game.world.randomY, 'pillow1');
	pillow.setAll("smoothed", false);
	}
	matches = game.add.group ();
	for (var i = 0; i < 20; i++){
	matches.create(game.world.randomX, game.world.randomY, 'matches');
	matches.setAll("smoothed", false);
	}
	frog = game.add.group ();
	for (var i = 0; i < 10; i++){
	frog.create(game.world.randomX, game.world.randomY, 'frog');
	frog.setAll("smoothed", false);
	frog.callAll("animations.add","animations","frog",[],10, true);
	frog.callAll("animations.play","animations","frog");
	frog.setAll("scale.x", .5);
	frog.setAll("scale.y", .5);
	}
	cars = game.add.group ();
	for (var i = 0; i < 10; i++){
	cars.create(game.world.randomX, game.world.randomY, 'car1');
	cars.create(game.world.randomX, game.world.randomY, 'car2');
	cars.setAll("smoothed", false);
	}
	barrel = game.add.group ();
	for (var i = 0; i < 10; i++){
	barrel.create(game.world.randomX, game.world.randomY, 'barrel4');
	barrel.setAll("smoothed", false);
	}
	ghostGroup = game.add.group();
    ghostGroup.enableBody = true;
	ghostGroupGen = game.time.events.loop(1000, genGhost, this);
    ghostGroupGen.timer.start();
	cursors = game.input.keyboard.createCursorKeys();
	player= game.add.sprite(100,0,"eyeCursor");	
	game.physics.arcade.enable(player);
	game.camera.follow(player);
	player.body.collideWorldBounds = true;
	player.anchor.set(0.5);
	player.smoothed=false;
	player.animations.add('blink', [], 2, true);
	player.animations.play('blink', [],2,true);
	arrows = game.add.bitmapText(player.position.x,player.position.y+60, 'font','  ← ↑ ↓ →\n arrow keys',28);
	arrows.anchor.x=0.5;
	arrows.smoothed=false;
	arrows.alpha=1;
	arrowTween = game.add.tween(arrows).to( { alpha: 0},1000,Phaser.Easing.Linear.None,true,0,-1);
	cloudGroup = game.add.group();
    cloudGroup.enableBody = true;
	cloudGroupGen = game.time.events.loop(500, genCloud, this);
    cloudGroupGen.timer.start();
	}
	function update(){
	player.body.velocity.x = 0;
	player.body.velocity.y = 0;
	if (cursors.down.isDown){      
        player.body.velocity.y = 150;
		if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
    }
	 else if (cursors.up.isDown){   
        player.body.velocity.y = -150;
		if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
    }	
	else if (cursors.right.isDown){
        player.body.velocity.x = 150;
		if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
    }
	else if (cursors.left.isDown){  
        player.body.velocity.x = -150;
		if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }
    }			
	}
	function genGhost(){
	for (var i = 0; i < 1; i++){
	var x = i * 1;
	var velocityX = game.rnd.integerInRange(-10, -80);         
	var ghost;
	ghost = ghostGroup.getFirstExists(false);
	if (!ghost) {               
	ghost = game.add.sprite(-10, 0, 'ghosts2');
	ghost.preUpdate();
	ghost.smoothed=false;
	ghostGroup.add(ghost);  
	ghost.animations.add("ghost", [],10,true);
	ghost.animations.play("ghost");			
	ghost.anchor.setTo(0.5, 0.5);    			
	game.physics.arcade.enableBody(ghost);
	ghost.enableBody = true;
	}        
	ghost.anchor.setTo(0.5, 0.5);
	ghost.reset(game.world.width-10,game.world.randomY); 
	ghost.body.velocity.x = velocityX;
	ghost.checkWorldBounds = true;
	ghost.outOfBoundsKill = true;	
	}		
	}
	function genCloud(){
	for (var i = 0; i < 1; i++){
	var x = i * 1;
	var velocityX = game.rnd.integerInRange(10, 80);         
	var cloud;
	cloud = cloudGroup.getFirstExists(false);
	if (!cloud) {               
	cloud = game.add.sprite(-100, 0, 'fogpink');
	cloud.preUpdate();
	cloud.smoothed=false;
	cloudGroup.add(cloud);  
	cloud.anchor.setTo(0.5, 0.5);    			
	game.physics.arcade.enableBody(cloud);
	cloud.enableBody = true;
	}        
	cloud.anchor.setTo(0.5, 0.5);
	cloud.reset(-100,game.world.randomY); 
	cloud.body.velocity.x = velocityX;
	cloud.checkWorldBounds = true;
	cloud.outOfBoundsKill = true;	
	}		
	}
</script>
</body>
