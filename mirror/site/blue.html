/*loading bar*/
	body.pace-running:before {
	content: "";

	top: 0;
	left: 0;
	bottom: 0;
	right: 0;
	z-index: 1500;
	background-color: rgba(0, 0, 0, 1);
}
body:before {
	background-color: rgba(0, 0, 0, 0);
	-webkit-transition: background-color 200ms;
	-moz-transtition: background-color 200ms;
	-ms-transition: background-color 200ms;
	-o-transition: background-color: 200ms;
	transition: background-color 200ms;
}
.pace {
	-webkit-pointer-events: none;
	pointer-events: none;
	-webkit-user-select: none;
	-moz-user-select: none;
	user-select: none;
	z-index: 2000;
	position: fixed;
	margin: auto;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	height: 5px;
	width: 200px;
	background: #fff;
	overflow: hidden;
	border-radius:10px;
	-moz-border-radius: 10px;
	-webkit-border-radius: 10px;
	-ms-border-radius:10px;
	-o-border-radius:10px;
	}
.pace .pace-progress {

	-ms-box-sizing: border-box;
	-o-box-sizing: border-box;
	box-sizing: border-box;

	-ms-transform: translate3d(0, 0, 0);
	-o-transform: translate3d(0, 0, 0);
	transform: translate3d(0, 0, 0);
	max-width: 200px;
	position: fixed;
	z-index: 2000;
	display: block;
	position: absolute;
	top: 0;
	right: 100%;
	height: 100%;
	width: 100%;
	background: magenta;
	}
	.pace.pace-inactive {
	display: none;
	}

	height:100%

	height:100vh;

	width: -webkit-calc(100% - 100px); /* Chrome, Safari */

    0% { opacity:1; }
    50% { opacity:0; }
    100% { opacity:1; }
}
@-webkit-keyframes blink{
    0% { opacity:1; }

	//ENTER DOOR STUFF
	var dooronegif = new Image();
	dooronegif.src = 'door1.gif';
	var doortwogif = new Image();
	doortwogif.src = 'door2.gif';
	var doortregif = new Image();
	doortregif.src = 'door3.gif';
	var imglist = ["door1","door2","door3"];
	numImgs= Math.floor(Math.random() * imglist.length) +1;
	toplist=[];
	for (i=0;i<numImgs;i++){
	  var prev=i-1;
	  if (toplist[prev] == null){
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		while ($('#red').height()<toplist[i] + 100){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs) + 1);
		}
	  } else{
		toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
		count = 0;
		while (($('#red').height()<=toplist[i] + ((i+1) * 100)) && (count <= 100)){
			toplist[i] = Math.floor(Math.random() * (1000 / numImgs)) + toplist[prev];
			count = count + 1;
		}	
	  };
	  imgindex = Math.floor(Math.random() * imglist.length);
	  var startingimage = new Image();
	  startingimage.src = imglist[imgindex] + "_start.png";
	  var div = document.createElement("div");
	  div.className = "leftimgcontain";
	  div.id = imglist[i];
	  div.style.top = toplist[i] + 'px';
	 div.style.visibility="hidden";
	  $('#red').append(div);
	  $('#' + imglist[i]).append(startingimage);
	};
	function setdoorgif(objid){
		var img = $(objid).find('img');
		var src = img.attr('src');
		var door = src.replace("_start.png", ".gif")
		if (door == 'door1.gif'){
			img.attr('src','door1.gif'); 
		} else if (door == 'door2.gif'){
			img.attr('src','door2.gif');
		} else if (door == 'door3.gif'){
			img.attr('src','door3.gif');
		}	
	}
	function setlinkfaderedirect(){
		cursors.right.enabled=false;
		cursors.left.enabled=false;
		cursors.up.enabled=false;
		cursors.down.enabled=false;
		player.alpha=0;
		poof = game.add.sprite(player.position.x,player.position.y,"poof");
		poof.smoothed=false;
		poof.anchor.x=0.5;
		poof.anchor.y=0.5;
		poof.animations.add("poof",[],25,false,true);
		poof.animations.play("poof",[],25,false,true);
	  	$('body').css('pointer-events','none');
		$("body").delay(500).animate({"opacity": "0"}, 2500); // fade out body
	  	var linklist = ["/flicker.html","/shimmer.html"];
		linkindex = Math.floor(Math.random() * linklist.length);
		link = linklist[linkindex];
		setTimeout(function(){
			window.location.assign(link);
		},3000);
	}
	$('#door1').click(function(){
		setdoorgif(this);
		setlinkfaderedirect();
	});	
	$('#door2').click(function(){
		setdoorgif(this);
		setlinkfaderedirect();
	});	
	$('#door3').click(function(){
		setdoorgif(this);
		setlinkfaderedirect();
	}); 
	var doorContain = $('#door');
//DONE WITH DOOR STUFF

	function update(){
	player.body.velocity.x = 0;
	player.body.velocity.y = 0;
	if (cursors.down.isDown){ 
    player.body.velocity.y = 150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}
	else if (cursors.up.isDown){
    player.body.velocity.y = -150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}	
	else if (cursors.right.isDown){
    player.body.velocity.x = 150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}
	else if (cursors.left.isDown){  
    player.body.velocity.x = -150;
	if (typeof arrows !== "undefined" && arrows && arrows.kill) { if (typeof arrows !== "undefined" && arrows && arrows.kill) { arrows.kill(); } }}}	
	function generateOwl(){
	for (var i = 0; i < 1; i++){
	var velocityX = game.rnd.integerInRange(-100, -300);           
	var owl;
	owl = owlGroup.getFirstExists(false);
	if (!owl) {            
	owl = game.add.sprite(-10, 0, 'owl');
	owl.preUpdate();
	owlGroup.add(owl);           
	owl.anchor.setTo(0.5, 0.5);
	owl.smoothed = false;
	owl.animations.add("owl",[],10,true);
	owl.animations.play("owl");
	game.physics.arcade.enableBody(owl);
	owl.enableBody = true;}
	owl.anchor.setTo(0.5, 0.5);
	owl.reset(game.world.width-10,game.world.randomY); 
	owl.body.velocity.x = velocityX;
	owl.checkWorldBounds = true;
	owl.outOfBoundsKill = true;}}
	function genSW (){
	for (var i = 0; i < 1; i++){
	var velocityX = game.rnd.integerInRange(100, 220);           
	var run;
	run = SWRunGroup.getFirstExists(false);
	if (!run) {            
	run = game.add.sprite(-40, 0, 'run');
	run.preUpdate();
	SWRunGroup.add(run);           
	run.anchor.setTo(0.5, 0.5);
	run.smoothed = false;
	run.animations.add("run",[],10,true);
	run.animations.play("run");
	game.physics.arcade.enableBody(run);
	run.enableBody = true;}
	run.anchor.setTo(0.5, 0.5);
	run.reset(-40,game.world.randomY+150); 
	run.body.velocity.x = velocityX;
	run.checkWorldBounds = true;
	run.outOfBoundsKill = true;}}
	function genCloud (){
	for (var i = 0; i < 1; i++) {
	var velocityX = game.rnd.integerInRange(40, 80);
	var cloud;
	cloud = cloudGroup.getFirstExists(false);
	if (!cloud) {
	cloud = game.add.sprite(-50, 0, 'cloud'+game.rnd.integerInRange(1,3));
	cloud.preUpdate();
	cloud.smoothed=false;
	cloudGroup.add(cloud);
	cloud.anchor.setTo(0, 0.5);
	game.physics.arcade.enableBody(cloud);
	cloud.enableBody = true;
	}
	cloud.anchor.setTo(0, 0.5);
	cloud.reset(-50,game.world.randomY); 
	cloud.body.velocity.x = velocityX;
	cloud.checkWorldBounds = true;
	cloud.outOfBoundsKill = true;
	}}
	function genTurtle(){
	for (var i = 0; i < 1; i++){
	var velocityX = game.rnd.integerInRange(-40, -60);
	var skelturt;
	skelturt = turtGroup.getFirstExists(false);
	if (!skelturt) {
	skelturt = game.add.sprite(game.world.randomX-10, 0, 'skelturt');
	skelturt.preUpdate();
	skelturt.animations.add('walkT', [0,1],10,true);
	skelturt.play('walkT');
	turtGroup.add(skelturt);
	skelturt.anchor.setTo(0, 0.5);
	game.physics.arcade.enableBody(skelturt);
	skelturt.enableBody = true;
	skelturt.inputEnabled = true;}			
	skelturt.anchor.setTo(0, 0.5);
	skelturt.reset(game.world.width-10,game.world.randomY+150); 
	skelturt.body.velocity.x = velocityX;
	skelturt.checkWorldBounds = true;
	skelturt.outOfBoundsKill = true;
}}

</script>
